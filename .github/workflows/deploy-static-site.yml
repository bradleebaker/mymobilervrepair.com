name: Deploy static site

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
  ACTIONS_ALLOW_USE_UNSECURE_NODE_VERSION: "false"
  CLOUDFRONT_DISTRIBUTION_ID: ${{ secrets.CLOUDFRONT_DISTRIBUTION_ID }}

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: production
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Validate AWS role secret
        env:
          AWS_ROLE_TO_ASSUME: ${{ secrets.AWS_ROLE_TO_ASSUME }}
        run: |
          if [[ "$AWS_ROLE_TO_ASSUME" != arn:aws:iam::* ]]; then
            echo "::error::AWS_ROLE_TO_ASSUME must be the full IAM role ARN, not the short role name. Example: arn:aws:iam::123456789012:role/deployment"
            exit 1
          fi

      - name: Configure AWS credentials via OIDC
        env:
          AWS_ROLE_TO_ASSUME: ${{ secrets.AWS_ROLE_TO_ASSUME }}
          AWS_REGION: us-west-2
        run: |
          export AWS_REGION="${AWS_REGION}"
          export AWS_WEB_IDENTITY_TOKEN_FILE=/tmp/aws-web-identity-token
          echo "$ACTIONS_ID_TOKEN_REQUEST_TOKEN" > /tmp/token.txt
          curl -sS -H "Authorization: bearer $ACTIONS_ID_TOKEN_REQUEST_TOKEN" -H "Accept: application/vnd.github+json" "$ACTIONS_ID_TOKEN_REQUEST_URL" | python3 -c 'import sys, json; print(json.load(sys.stdin)["value"])' > "$AWS_WEB_IDENTITY_TOKEN_FILE"
          aws sts assume-role-with-web-identity \
            --role-arn "$AWS_ROLE_TO_ASSUME" \
            --role-session-name "GitHubActions-${GITHUB_RUN_ID}" \
            --web-identity-token file://$AWS_WEB_IDENTITY_TOKEN_FILE \
            --duration-seconds 3600 \
            --query 'Credentials.[AccessKeyId,SecretAccessKey,SessionToken]' \
            --output text > /tmp/aws-creds.txt
          AWS_ACCESS_KEY_ID=$(cut -f1 /tmp/aws-creds.txt)
          AWS_SECRET_ACCESS_KEY=$(cut -f2 /tmp/aws-creds.txt)
          AWS_SESSION_TOKEN=$(cut -f3 /tmp/aws-creds.txt)
          echo "AWS_ACCESS_KEY_ID=$AWS_ACCESS_KEY_ID" >> "$GITHUB_ENV"
          echo "AWS_SECRET_ACCESS_KEY=$AWS_SECRET_ACCESS_KEY" >> "$GITHUB_ENV"
          echo "AWS_SESSION_TOKEN=$AWS_SESSION_TOKEN" >> "$GITHUB_ENV"
          echo "AWS_DEFAULT_REGION=$AWS_REGION" >> "$GITHUB_ENV"

      - name: Sync site to S3
        run: |
          aws s3 sync . s3://${{ secrets.S3_BUCKET_NAME }} --delete

      - name: Invalidate CloudFront cache
        if: ${{ env.CLOUDFRONT_DISTRIBUTION_ID != '' }}
        run: |
          aws cloudfront create-invalidation --distribution-id "$CLOUDFRONT_DISTRIBUTION_ID" --paths "/*"
